<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Roller Website</title>
    <link rel="stylesheet" href="DiceRoller.css">
</head>
<body>
    <div id="container">
        <h1>Dice Roller</h1>
        <label for="userInput">Pick a number:</label>
        <input type="number" value="1" min="1" id="userInput">
        <button type="button" onclick="runRollBtn()">Dice Roller</button>
        <div id="diceTotal"></div>
        <div id="diceResult"></div>        
        <div id="diceImages"></div>
    </div>
    <script src="DiceRoller.js"></script>
</body>
</html>
